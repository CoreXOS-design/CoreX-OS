# CoreX OS — the canonical production vhost.
#
# Split out of the old `corex.hfcoastal.co.za` file on 2026-07-17. That single
# server block served corex.hfcoastal.co.za, corexos.co.za AND www.corexos.co.za
# from one root, which is why the old hostname could never simply be deleted —
# doing so would have taken the main site down with it. The old hostname now
# lives in its own redirect-only vhost (see corex.hfcoastal.co.za).
#
# SSL NOTE: the certificate lineage is still NAMED corex.hfcoastal.co.za, but its
# SANs cover corexos.co.za and www.corexos.co.za. Do NOT drop the old hostname
# from that certificate — the redirect vhost needs a valid cert for it, and this
# vhost is served by the same lineage.
server {
    server_name corexos.co.za www.corexos.co.za;
    root /corex/public;
    index index.php index.html;
    client_max_body_size 1000M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 600;
    }

    location ~ /\.ht {
        deny all;
    }

    location /staging-imgs/ {
        alias /corex-staging/public/;
        try_files $uri $uri/ =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/corex.hfcoastal.co.za/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/corex.hfcoastal.co.za/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    server_name corexos.co.za www.corexos.co.za;

    # ACME first: a prefix location beats the redirect below, so certbot can
    # always answer a challenge. A server-level `return` would run in the rewrite
    # phase BEFORE location matching and swallow it.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
