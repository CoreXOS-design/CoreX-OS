# corex.hfcoastal.co.za — RETIRED. Redirect only. Serves no application.
#
# 2026-07-17: this file used to serve the app for corex.hfcoastal.co.za,
# corexos.co.za AND www.corexos.co.za from one server block. The app now lives in
# `corexos.co.za`; this hostname only points people at it.
#
# The DNS record and the TLS certificate for this hostname MUST STAY. A redirect
# is still a response: a browser hitting https://corex.hfcoastal.co.za completes
# the TLS handshake BEFORE it ever sees the 308, so pulling the cert would give
# visitors a security warning instead of a redirect. "Removed" here means "serves
# no application", not "no longer resolves".
#
# 308, not 301, on purpose. Both extensions POST to an agent-configured base URL
# (chrome-extension/wa-capture → /communications/wa/ingest,
#  portal-capture → /portal-captures/ingest), and browsers/fetch downgrade a
# redirected POST to GET on a 301 — the request body is silently dropped. 308
# preserves method and body, so an agent whose stored base URL is still this
# hostname keeps working instead of failing quietly. Same for the ~186 form
# POSTs/day still coming from pages on this host. Do not "simplify" this to 301.
#
# Sessions: SESSION_DOMAIN is null, so cookies are host-scoped. Anyone redirected
# here from an active session on the old hostname lands logged out on
# corexos.co.za and signs in again. That is expected and one-time.
server {
    listen 443 ssl;
    server_name corex.hfcoastal.co.za;

    ssl_certificate /etc/letsencrypt/live/corex.hfcoastal.co.za/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/corex.hfcoastal.co.za/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # ACME first — this cert's SANs also cover corexos.co.za, so a failed renewal
    # here expires the MAIN site's certificate too. Must out-rank the redirect.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # $request_uri keeps the full path + query, so a deep link lands on the same
    # page rather than the home page.
    location / {
        return 308 https://corexos.co.za$request_uri;
    }
}

server {
    listen 80;
    server_name corex.hfcoastal.co.za;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 308 https://corexos.co.za$request_uri;
    }
}
