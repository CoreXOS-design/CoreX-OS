<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, Helvetica, sans-serif; width: 320px; padding: 14px; color: #0f172a; }
    h1 { font-size: 14px; margin: 0 0 4px; }
    p.note { font-size: 11px; color: #64748b; margin: 0 0 12px; }
    label { display: block; font-size: 11px; font-weight: 600; margin: 10px 0 3px; }
    input { width: 100%; box-sizing: border-box; padding: 7px; font-size: 12px; border: 1px solid #e5e7eb; border-radius: 6px; }
    button { margin-top: 12px; width: 100%; padding: 8px; font-size: 12px; font-weight: 600; background: #00b4d8; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .status { margin-top: 10px; font-size: 11px; color: #64748b; }
    .ro { margin-top: 12px; font-size: 10px; color: #16a34a; }
    .conn { margin: 10px 0 4px; padding: 8px 10px; font-size: 11px; border-radius: 6px; background: #f1f5f9; color: #334155; line-height: 1.4; word-break: break-word; }
    .conn.ok { background: #dcfce7; color: #166534; }
    .conn.bad { background: #fee2e2; color: #991b1b; }
    .ver { font-size: 10px; color: #94a3b8; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>CoreX WhatsApp Capture</h1>
  <p class="note">Read-only. Captures business WhatsApp conversations into the CoreX Communication Archive. It never sends messages.</p>

  <div class="conn" id="conn">Checking connection…</div>
  <div class="ver" id="ver"></div>

  <label for="base-url">CoreX URL</label>
  <input id="base-url" type="text" placeholder="https://corexos.co.za">

  <label for="device-token">Device token</label>
  <input id="device-token" type="password" placeholder="Paste the token from My Portal → WhatsApp Capture">

  <label style="display:flex;align-items:center;gap:6px;font-weight:500;margin-top:12px;">
    <input id="history-sweep" type="checkbox" style="width:auto;margin:0;"> Backfill history for known contacts (paced, read-only)
  </label>
  <label style="display:flex;align-items:center;gap:6px;font-weight:500;margin-top:6px;">
    <input id="wa-debug" type="checkbox" style="width:auto;margin:0;"> Verbose console logging (DevTools → Console)
  </label>

  <button id="save">Save</button>
  <div class="status" id="status"></div>
  <div class="ro">● Read-only — this extension cannot send WhatsApp messages.</div>

  <script src="popup.js"></script>
</body>
</html>
